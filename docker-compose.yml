# Xavfsizlik: DB/Redis/API portlari faqat hostning 127.0.0.1 — tashqi tarmoqdan to'g'ridan-to'g'ri ulanish yo'q.
# API ni boshqa portga (masalan 8006) bog'lash: "127.0.0.1:8006:8000"
# POSTGRES_PASSWORD .env orqali (POSTGRES_PASSWORD) — yangi o'rnatishda kuchli parol qo'ying.
# Mavjud pgdata bilan parolni o'zgartirish: DB ichida ALTER USER yoki yangi volume (ma'lumot yo'qoladi).

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-worker-env: &worker-env
  DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/autopost
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  SESSIONS_DIR: /app/sessions

x-depends-full: &depends-full
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: autopost
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *worker-env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - sessions:/app/sessions
    <<: *depends-full
    logging: *default-logging

  worker_campaign:
    build: .
    command: celery -A worker.celery_app:celery_app worker -l info -Q campaign -c ${CELERY_CAMPAIGN_WORKER_CONCURRENCY:-2} --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1} --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-30} --max-memory-per-child=${CELERY_WORKER_MAX_MEMORY_PER_CHILD_KB:-450000}
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *worker-env
    volumes:
      - sessions:/app/sessions
    <<: *depends-full
    logging: *default-logging

  # SESSION_RUNNER_ENABLED=true bo'lsa: Telethon sessiyalarini uzoq muddat ochiq ushlab,
  # Redis navbatidan kampaniya roundlarini bajaradi. worker_campaign bilan bir vaqtda
  # ishlamasligi kerak (ikkala yo'l bir xil vazifani ikki marta bajaradi).
  session_runner:
    build: .
    command: python -m runner.main
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *worker-env
    volumes:
      - sessions:/app/sessions
    <<: *depends-full
    logging: *default-logging
    profiles:
      - session_runner

  worker_aux:
    build: .
    command: celery -A worker.celery_app:celery_app worker -l info -Q default,scheduler -c ${CELERY_AUX_WORKER_CONCURRENCY:-1} --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1} --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-30} --max-memory-per-child=${CELERY_WORKER_MAX_MEMORY_PER_CHILD_KB:-450000}
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *worker-env
    volumes:
      - sessions:/app/sessions
    <<: *depends-full
    logging: *default-logging

  beat:
    build: .
    command: celery -A worker.celery_app:celery_app beat -l info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/autopost
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging

  bot:
    build: .
    command: python -m bot.main
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *worker-env
    volumes:
      - sessions:/app/sessions
    <<: *depends-full
    logging: *default-logging

volumes:
  pgdata:
  sessions:
